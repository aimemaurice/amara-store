version: '3.9'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: amara-client
    ports:
      - "3000:80"
    networks:
      - amara-network
    depends_on:
      - server
    environment:
      - VITE_API_BASE_URL=http://server:5000/api

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: amara-server
    ports:
      - "5000:5000"
    networks:
      - amara-network
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
    volumes:
      - ./server/src:/app/src
    restart: unless-stopped

networks:
  amara-network:
    driver: bridge
